[project]
name = "contextmine-core"
version = "0.1.0"
description = "Shared core library for ContextMine"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.2",
    "sqlalchemy[asyncio]>=2.0.51",
    "asyncpg>=0.31.0",
    "pgvector>=0.4.2",
    "alembic>=1.18.4",
    "cryptography>=49.0.0",
    "httpx>=0.28.1",
    "openai>=2.44.0",
    "google-genai>=2.10.0",
    "tenacity>=9.1.4",
    # LangChain for LLM abstraction (stable 1.x)
    "langchain-core>=1.4.8",
    "langchain-anthropic>=1.4.7",
    "langchain-openai>=1.3.3",
    "langgraph>=1.2.6",
    "claude-code-sdk>=0.0.25",
    # SCIP protobuf parsing for code intelligence
    "protobuf>=6.33.6",
    "lizard>=1.23.0",
    # Tree-sitter for AST-based analysis (rule extraction, outline)
    "tree-sitter-language-pack>=1.10.9",
    # OpenTelemetry (optional - only imports when OTEL_ENABLED=true)
    "opentelemetry-sdk>=1.43.0",
    "opentelemetry-api>=1.43.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.43.0",
    "opentelemetry-instrumentation-fastapi>=0.64b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.64b0",
    "opentelemetry-instrumentation-httpx>=0.64b0",
    "opentelemetry-instrumentation-logging>=0.64b0",
    "defusedxml>=0.7.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["contextmine_core"]
